<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>simple-web-app</title>
    <meta name="description" content="A simple static site published with GitHub Pages." />
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f8fafc;
        color: #0f172a;
      }

      main {
        max-width: 680px;
        margin: 64px auto;
        padding: 24px;
        background: #ffffff;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
      }

      h1 {
        margin-top: 0;
      }

      .meta {
        color: #475569;
      }

      .url {
        display: inline-block;
        margin-top: 12px;
        padding: 8px 12px;
        border-radius: 8px;
        background: #e2e8f0;
        color: #0f172a;
        text-decoration: none;
        word-break: break-all;
      }

      .url:hover {
        background: #cbd5e1;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>simple-web-app is published</h1>
      <p class="meta">This site is hosted on GitHub Pages and ready to share.</p>
      <a class="url" href="https://rejectionwarrior.github.io/simple-web-app/">
        https://rejectionwarrior.github.io/simple-web-app/
      </a>
    </main>
  </body>
</html>
